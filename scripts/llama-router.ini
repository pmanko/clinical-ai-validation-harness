[qwen2.5-32b]
model = /Users/pmanko/.cache/llama-router-models/qwen2.5-32b.gguf

[medgemma-27b]
model = /Users/pmanko/.cache/llama-router-models/medgemma-27b.gguf

# --- HIGH synth: thinking MoE — sampling (Qwen3 forbids greedy) + a BOUNDED reasoning
# budget. Unbounded (-1) rambled ~4000 thinking tokens then emitted no answer on the complex
# WHO-guideline synthesis turn; 1024 lets it reason then forces the final answer (the
# non-thinking qwen2.5 synths answer well with no thinking at all, so this is generous). ---
[qwen3.6-35b]
model = /Users/pmanko/.cache/llama-router-models/qwen3.6-35b.gguf
temp = 0.6
top-p = 0.95
top-k = 20
reasoning-budget = 1024

