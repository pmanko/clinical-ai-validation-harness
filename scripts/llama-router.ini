; llama-router model presets — serves every GGUF arm on :8077 for the harness:
;   - the chat picker's "llama-server" section (single-LLM chart-QA arms), and
;   - the med-agent-hub team roles when LLM_BASE_URL points here.
; Launched by scripts/llama-router-up.sh (which also rebuilds the model symlinks).
;
; ';' is an INI INLINE comment, so a value must not contain ';'. That is why there is
; no `samplers =` line: build 9430's DEFAULT sampler chain already includes DRY, and a
; ';'-delimited sampler list would be truncated at the first ';'.
;
; [*] = defaults applied to every preset below.
; DRY default is 0.8 so the single-LLM gemma arms get anti-repetition WITHOUT relying on
; the caller: chartsearchai sends a fixed chart prompt and no dry params, and gemma-4
; collapses into a repetition loop on long greedy JSON without DRY. The med-agent-hub
; overrides dry_multiplier PER REQUEST per role (orchestrator 0 = off, expert/synth 0.8);
; the router honors per-request DRY, so those calls win over this default.
;
; model = symlink under ~/.cache/llama-router-models/ (rebuilt by llama-router-up.sh from
; the HF cache). Combined with HF_HOME redirected to an empty dir, the router advertises
; ONLY these presets — not every other repo sitting in the real HF cache.

[*]
seed = 42
temp = 0.0
dry-multiplier = 0.8
dry-base = 1.75
dry-allowed-length = 2
dry-penalty-last-n = -1

[gemma-e4b]
model = /Users/pmanko/.cache/llama-router-models/gemma-e4b.gguf

[gemma-26b-a4b]
model = /Users/pmanko/.cache/llama-router-models/gemma-26b-a4b.gguf

[medgemma-4b]
model = /Users/pmanko/.cache/llama-router-models/medgemma-4b.gguf

[medgemma-27b]
model = /Users/pmanko/.cache/llama-router-models/medgemma-27b.gguf

[qwen2.5-14b]
model = /Users/pmanko/.cache/llama-router-models/qwen2.5-14b.gguf

[qwen2.5-32b]
model = /Users/pmanko/.cache/llama-router-models/qwen2.5-32b.gguf

; Qwen3.6 is a thinking model — greedy is forbidden, it needs temp>0 + top-k/top-p.
; Overrides the [*] temp=0.0. The hub also sends a synth temperature per request.
[qwen3.6-35b]
model = /Users/pmanko/.cache/llama-router-models/qwen3.6-35b.gguf
temp = 0.6
top-k = 20
top-p = 0.95
