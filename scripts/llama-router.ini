# llama.cpp Router Mode model presets — one OpenAI endpoint, on-demand boot, auto-download via hf-repo.
# Launch:  scripts/llama-router-up.sh   (redirects HF_HOME to an empty dir so the router does NOT
#          auto-publish cached HF models as extra/untuned presets — build 9430 has no flag for that).
# All sections use local model= paths (symlinks in ~/.cache/llama-router-models), so no runtime download.
#
# Global defaults = temp 0 (greedy) + chartsearchai's tuned DRY params, single KV slot. We deliberately
# do NOT set `samplers`: build 9430's default chain already includes dry
# (penalties;dry;top_n_sigma;top_k;typ_p;top_p;min_p;xtc;temperature), and an INI value cannot carry the
# ';' separator — it is parsed as an inline comment, which silently truncates `dry;temperature` to `dry`
# (and drops top_k/top_p/temperature for the thinking synth). So we set the dry-* params + temp/top-k/top-p
# and let the default chain apply them. At temp 0 the extra default samplers are no-ops (greedy = argmax),
# so this matches chartsearchai's [dry,temperature]. The thinking synth (qwen3.6) overrides temp/top-p/top-k
# for sampling (Qwen3 forbids greedy). reasoning-budget 0 for non-thinking, a bounded budget for the thinking synth (see [qwen3.6-35b]).
# `seed` is pinned for reproducibility.
#
# EASY PER-MODEL OVERRIDE: [*] below is the shared default. To change any setting for ONE
# model, just add that key under its [section] — it overrides [*] for that model only
# (temp, top-p/top-k/min-p, dry-multiplier/dry-base/dry-allowed-length, max-tokens,
# ctx-size, ngl, reasoning-budget, seed, …). See [qwen3.6-35b] for a worked example.

[*]
ngl = 99
ctx-size = 24576
parallel = 1
temp = 0
seed = 42
dry-multiplier = 0.8
dry-base = 1.75
dry-allowed-length = 8
dry-penalty-last-n = -1
reasoning-budget = 0

# --- Single-LLM parity arms + team orchestrator (GGUF already on disk — reuse, no re-download) ---
