# Harness-owned shared infrastructure: OpenMRS 3.x Reference Application
# (O3 / modern UI) running on top of OpenMRS Core/Platform 2.8.x.
#
# Image pins mirror the canonical distro at
# https://github.com/openmrs/openmrs-distro-referenceapplication (verified
# 2026-05-13; current stable tag 3.6.0). Bump TAG via environment override.
#
# Filename retains "2.8" to identify the OpenMRS Core/Platform line this
# stack sits on; the RefApp itself is 3.x (latest stable 3.6.0).
#
# Access pattern: a `proxy` service (Caddy) fronts everything. Internal
# services (gateway, frontend, backend) are NOT exposed on the host. Reach
# the RefApp at http://localhost:${HARNESS_PROXY_HTTP_PORT:-8088}/openmrs/spa
# (configurable; default 8088 avoids 8080 conflicts with OrbStack/etc.).
# To add new HTTP services (chartsearchai gateway, etc.), route them in
# compose/Caddyfile.

services:
  proxy:
    image: caddy:2.8-alpine
    container_name: harness-proxy
    restart: "unless-stopped"
    ports:
      - "${HARNESS_PROXY_HTTP_PORT:-8088}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/__proxy_health"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    image: openmrs/openmrs-reference-application-3-gateway:${OPENMRS_REFAPP_TAG:-3.6.0}
    container_name: harness-openmrs-gateway
    restart: "unless-stopped"
    depends_on:
      - frontend
      - backend
    # Intentionally NOT exposed on the host; access via the `proxy` service.
    expose:
      - "80"

  frontend:
    image: openmrs/openmrs-reference-application-3-frontend:${OPENMRS_REFAPP_TAG:-3.6.0}
    container_name: harness-openmrs-frontend
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config-core_demo.json
      SPA_DEFAULT_LOCALE:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 5s
    depends_on:
      - backend

  backend:
    image: openmrs/openmrs-reference-application-3-backend:${OPENMRS_REFAPP_TAG:-3.6.0}
    container_name: harness-openmrs-backend
    restart: "unless-stopped"
    depends_on:
      - db
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs"]
      timeout: 5s
    volumes:
      - openmrs-data:/openmrs/data
      - ../artifacts/openmrs/modules:/openmrs/data/modules

  db:
    image: mariadb:10.11.7
    container_name: harness-openmrs-db
    restart: "unless-stopped"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    healthcheck:
      test: "mariadb --user=${OMRS_DB_USER:-openmrs} --password=${OMRS_DB_PASSWORD:-openmrs} --execute \"SHOW DATABASES;\""
      interval: 3s
      timeout: 1s
      retries: 5
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}
    ports:
      - "${OMRS_DB_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  openmrs-data:
  db-data:
  caddy-data:
  caddy-config:
